name: Release

on:
  workflow_dispatch:

jobs:
  release:
    name: Bump version on main, fast-forward v0.1, tag and release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Read current version from main
        id: current
        run: |
          VERSION=$(python3 -c "
          import re
          content = open('pyproject.toml').read()
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', content, re.MULTILINE)
          print(m.group(1))
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute next patch version
        id: next
        run: |
          IFS='.' read -ra P <<< "${{ steps.current.outputs.version }}"
          P[2]=$(( P[2] + 1 ))
          echo "version=${P[0]}.${P[1]}.${P[2]}" >> "$GITHUB_OUTPUT"

      - name: Bump version, commit via GitHub API, and fast-forward v0.1
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT="${{ steps.next.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$NEXT\"/" pyproject.toml

          # Commit via GitHub Contents API — GitHub signs the commit, shows as "Verified"
          FILE_SHA=$(gh api "repos/$GITHUB_REPOSITORY/contents/pyproject.toml" --jq '.sha')
          COMMIT_SHA=$(gh api "repos/$GITHUB_REPOSITORY/contents/pyproject.toml" \
            --method PUT \
            --field message="chore: release v$NEXT" \
            --field "content=$(base64 -w0 pyproject.toml)" \
            --field sha="$FILE_SHA" \
            --field branch="main" \
            --jq '.commit.sha')
          echo "sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

          # Fast-forward v0.1 to the new commit
          gh api "repos/$GITHUB_REPOSITORY/git/refs/heads/v0.1" \
            --method PATCH \
            --field sha="$COMMIT_SHA"

      - name: Tag and create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.next.outputs.version }}"
          COMMIT_SHA="${{ steps.bump.outputs.sha }}"

          # Create annotated tag via GitHub API — GitHub signs it server-side, shows as "Verified"
          TAG_SHA=$(gh api "repos/$GITHUB_REPOSITORY/git/tags" \
            --method POST \
            --field tag="$TAG" \
            --field message="Release $TAG" \
            --field object="$COMMIT_SHA" \
            --field type="commit" \
            --jq '.sha')

          gh api "repos/$GITHUB_REPOSITORY/git/refs" \
            --method POST \
            --field ref="refs/tags/$TAG" \
            --field sha="$TAG_SHA"

          gh release create "$TAG" --generate-notes --title "$TAG"
