name: Release

on:
  workflow_dispatch:

jobs:
  release:
    name: Bump version on main, fast-forward v0.1, tag and release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Read current version from main
        id: current
        run: |
          VERSION=$(python3 -c "
          import re
          content = open('pyproject.toml').read()
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', content, re.MULTILINE)
          print(m.group(1))
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute next patch version
        id: next
        run: |
          IFS='.' read -ra P <<< "${{ steps.current.outputs.version }}"
          P[2]=$(( P[2] + 1 ))
          echo "version=${P[0]}.${P[1]}.${P[2]}" >> "$GITHUB_OUTPUT"

      - name: Bump version, commit, and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEXT="${{ steps.next.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$NEXT\"/" pyproject.toml
          git add pyproject.toml
          git commit -m "chore: release v$NEXT"
          git push origin main

      - name: Fast-forward v0.1 to main
        run: git push origin main:v0.1

      - name: Tag and create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.next.outputs.version }}"
          COMMIT_SHA=$(git rev-parse HEAD)

          # Create annotated tag via GitHub API — GitHub signs it, shows as "Verified"
          TAG_SHA=$(gh api "repos/$GITHUB_REPOSITORY/git/tags" \
            --method POST \
            --field tag="$TAG" \
            --field message="Release $TAG" \
            --field object="$COMMIT_SHA" \
            --field type="commit" \
            --jq '.sha')

          gh api "repos/$GITHUB_REPOSITORY/git/refs" \
            --method POST \
            --field ref="refs/tags/$TAG" \
            --field sha="$TAG_SHA"

          gh release create "$TAG" --generate-notes --title "$TAG"
