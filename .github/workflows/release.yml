name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Update floating major.minor tag
        # For a tag like v0.1.2, creates/moves v0.1 to the same commit.
        # Allows users to pin to a minor version: @v0.1
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v0.1.2
          MINOR=$(echo "$TAG" | grep -oP '^v\d+\.\d+')  # e.g. v0.1
          if [ -n "$MINOR" ]; then
            git tag -f "$MINOR"
            git push --force origin "$MINOR"
          fi
